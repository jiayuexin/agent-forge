version: '3.8'
services:
  dashboard:
    build: .
    command: dashboard --port 8080
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  agent-customer:
    build: .
    command: serve ./agents/agent-customer-service --port 3001
    ports:
      - "3001:3001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  agent-sales:
    build: .
    command: serve ./agents/agent-sales-assistant --port 3002
    ports:
      - "3002:3002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
